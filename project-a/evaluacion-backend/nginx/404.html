<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Not Found</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid; place-items: center;
      font-family: ui-serif, Georgia, serif;
      background: #f7f3ee; color: #1a1a1a;
    }
    .card { text-align: center; padding: 2rem; }
    .code { font-size: 6rem; font-weight: 700; letter-spacing: -0.05em; }
    .msg { font-size: 1.25rem; color: #555; margin: 0.5rem 0 1.5rem; }
    a { color: #6f1d1b; text-decoration: none; border-bottom: 1px solid currentColor; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <p class="msg">The page you requested could not be found.</p>
    <a href="/">Return home</a>
  </div>
</body>
</html>
